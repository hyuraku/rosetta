name: CI

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Build and test job
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v -o rosetta main.go

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage-unit.txt -covermode=atomic ./tests/unit/...

      - name: Run integration tests
        run: go test -v -race -timeout=5m -coverprofile=coverage-integration.txt -covermode=atomic ./tests/integration/...

  # Lint job
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # .golangci.yml is v2 format; pin the same version used locally
          # so "green locally, red in CI" cannot happen.
          version: v2.10.1
